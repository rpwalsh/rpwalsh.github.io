  <style>
    *{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,"Segoe UI",sans-serif;background:var(--page-bg,#050914);color:var(--page-text,#dbeafe)}button,input,textarea{font:inherit}header{height:42px;padding:.35rem .6rem;gap:.45rem;display:flex;align-items:center;border-bottom:1px solid var(--page-border);background:var(--page-panel);position:relative;z-index:30}.hdr-brand{display:flex;align-items:center;gap:.45rem}.hdr-mark{width:18px;height:18px;border:1px solid var(--page-border);display:grid;place-items:center;font:800 .52rem ui-monospace;color:var(--page-accent)}.hdr-brand-name{font:800 .6rem ui-monospace;letter-spacing:.2em;text-transform:uppercase}.hdr-vsep{width:1px;height:14px;background:var(--page-border)}.hdr-context h1{font-size:.74rem;margin:0}.hdr-context p{display:none}.hdr-palette{flex:1;align-self:stretch;position:relative;display:flex}.hdr-palette-btn{flex:1;border:0;color:#fff;font-weight:700;cursor:pointer}.hdr-palette-popup{display:none;position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);z-index:40;width:260px;max-height:70vh;overflow:auto;padding:10px;background:var(--page-panel);border:1px solid var(--page-border)}.hdr-palette-popup.is-open{display:block}.hdr-pop-mode-row{text-align:right;margin-bottom:8px}.hdr-pop-mode{border:1px solid var(--page-border);background:transparent;color:var(--page-text);padding:4px 10px}.hdr-pop-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.hdr-pop-swatch{height:28px;border:1px solid transparent}.hdr-pop-swatch.active{border-color:#fff}.header-links{display:flex;gap:2px;overflow:auto}.editor-link{min-height:26px;padding:0 .5rem;border:1px solid var(--page-border);background:transparent;color:var(--page-muted);font-size:.62rem;font-weight:700;text-transform:uppercase}.editor-link.active{color:var(--page-accent);border-color:var(--page-accent)}.hdr-nav-sep{width:1px;background:var(--page-border);margin:0 4px;flex:none}
    .shell{height:calc(100vh - 42px);display:grid;grid-template-columns:260px minmax(0,1fr) 390px;gap:8px;padding:8px}.panel{border:1px solid var(--page-border);background:var(--page-panel);min-width:0;overflow:hidden}.catalog{display:flex;flex-direction:column}.head{padding:14px;border-bottom:1px solid var(--page-border)}.eyebrow{font:800 10px ui-monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--page-accent)}h2{margin:6px 0;font-size:19px}.muted{color:var(--page-muted);font-size:12px;line-height:1.5;margin:0}.control{width:100%;margin-top:10px;padding:9px;border:1px solid var(--page-border);background:var(--page-bg);color:var(--page-text)}.list{overflow:auto;padding:7px;display:grid;gap:6px}.item{padding:10px;border:1px solid var(--page-border);background:var(--page-bg);color:var(--page-text);text-align:left;cursor:pointer}.item strong,.item span{display:block}.item span{margin-top:4px;color:var(--page-muted);font-size:10px;text-transform:uppercase}.item.active,.item:hover{border-color:var(--page-accent);background:color-mix(in srgb,var(--page-accent) 8%,var(--page-bg))}.workspace{display:grid;grid-template-rows:auto minmax(0,1fr) auto}.workspace-head{padding:14px;border-bottom:1px solid var(--page-border);display:flex;justify-content:space-between;gap:12px}.preview{min-height:0;padding:24px;display:grid;place-items:center;overflow:auto;background:radial-gradient(circle at 50% 0,color-mix(in srgb,var(--page-accent) 10%,transparent),transparent 48%),var(--page-bg)}.preview>*{width:min(100%,760px)}.metrics{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--page-border)}.metrics div{padding:10px;border-right:1px solid var(--page-border)}.metrics span,.metrics strong{display:block}.metrics span{color:var(--page-muted);font-size:10px;text-transform:uppercase}.metrics strong{margin-top:3px;font:700 12px ui-monospace;color:var(--page-accent)}.editor{display:grid;grid-template-rows:auto minmax(0,1fr) minmax(150px,.55fr)}.toolbar{padding:10px;border-bottom:1px solid var(--page-border);display:flex;gap:6px}.toolbar input{width:76px;padding:7px;border:1px solid var(--page-border);background:var(--page-bg);color:var(--page-text)}.toolbar button,.links a{padding:7px 10px;border:1px solid var(--page-border);background:transparent;color:var(--page-text);text-decoration:none;cursor:pointer}.toolbar button:hover,.links a:hover{border-color:var(--page-accent);color:var(--page-accent)}textarea,pre{margin:0;padding:12px;border:0;background:var(--page-bg);color:var(--page-text);font:11px/1.55 ui-monospace;overflow:auto;resize:none;outline:none}pre{border-top:1px solid var(--page-border);white-space:pre-wrap}.links{display:flex;gap:6px;align-items:center}.error{color:#ff7f87!important}@media(max-width:1100px){.shell{grid-template-columns:220px minmax(0,1fr)}.editor{grid-column:1/-1;min-height:520px}.shell{height:auto}.preview{min-height:480px}}@media(max-width:720px){.shell{grid-template-columns:1fr}.catalog{max-height:460px}.workspace{min-height:620px}.metrics{grid-template-columns:1fr}.header-links{max-width:46vw}}
  </style>

<body>
  <header id="site-header"><div class="hdr-brand"><span class="hdr-mark">RL</span><span class="hdr-brand-name">Risklab</span></div><span class="hdr-vsep"></span><div class="hdr-context"><h1></h1><p></p></div><div class="hdr-palette" id="hdr-palette"></div><nav class="header-links"></nav></header>
  <main class="shell">
    <aside class="panel catalog"><div class="head"><span class="eyebrow">Compiled style contracts</span><h2>Styler Catalog</h2><p class="muted">Live output from the published compiler.</p><input id="search" class="control" type="search" placeholder="Search recipes"></div><div id="list" class="list"></div></aside>
    <section class="panel workspace"><div class="workspace-head"><div><span id="group" class="eyebrow"></span><h2 id="title"></h2><p id="summary" class="muted"></p></div><div class="links"><a id="builder" href="../builder/">Builder</a><a id="wiki" href="../wiki/">Wiki</a></div></div><div id="preview" class="preview"></div><div class="metrics"><div><span>Atomic rules</span><strong id="rules">0</strong></div><div><span>Source hash</span><strong id="hash">-</strong></div><div><span>Compiled CSS</span><strong id="size">0 bytes</strong></div></div></section>
    <aside class="panel editor"><div class="toolbar"><input id="prefix" value="rs" aria-label="Class prefix"><button id="apply">Compile</button><button id="format">Format</button><button id="copy">Copy CSS</button></div><textarea id="json" spellcheck="false" aria-label="Style document JSON"></textarea><pre id="css" aria-label="Compiled CSS"></pre></aside>
  </main>
