<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RiskLab Command | RiskLab</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>R</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --uc-ease-standard: cubic-bezier(0.22, 0.68, 0.14, 1);
      --uc-ease-spring: cubic-bezier(0.2, 0.8, 0.2, 1);
      --uc-ease-out: cubic-bezier(0.17, 0.84, 0.44, 1);
      --uc-dur-fast: 120ms;
      --uc-dur-mid: 210ms;
      --uc-dur-slow: 360ms;
      --uc-header-max: 1760px;
      --uc-page-bg: #040b15;
      --uc-page-bg-elevated: #0a1322;
      --uc-page-surface: rgba(9, 16, 28, 0.88);
      --uc-page-surface-strong: rgba(9, 16, 28, 0.96);
      --uc-page-panel: rgba(13, 22, 38, 0.88);
      --uc-page-panel-alt: rgba(9, 16, 28, 0.72);
      --uc-page-text: #dbe6f5;
      --uc-page-muted: #8da0ba;
      --uc-page-border: rgba(71, 85, 105, 0.56);
      --uc-page-accent: #38bdf8;
      --uc-page-accent-alt: #818cf8;
      --uc-page-accent-warm: #f59e0b;
      --uc-page-accent-soft: rgba(56, 189, 248, 0.14);
      --uc-page-shadow: 0 18px 32px rgba(2, 8, 23, 0.28);
      --uc-page-shadow-soft: 0 10px 22px rgba(2, 8, 23, 0.16);
      --uc-page-radius: 12px;
      --uc-page-radius-lg: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(80% 44% at 50% -6%, color-mix(in srgb, var(--uc-page-accent) 11%, transparent), transparent 58%),
        radial-gradient(55% 30% at 92% -4%, color-mix(in srgb, var(--uc-page-accent-alt) 9%, transparent), transparent 50%),
        linear-gradient(180deg, var(--uc-page-bg) 0%, color-mix(in srgb, var(--uc-page-bg) 97%, #000 3%) 100%);
      color: var(--uc-page-text);
      overflow-x: hidden;
      min-height: 100vh;
    }
    body.mission-mode {
      min-height: 100dvh;
      height: 100dvh;
      overflow-x: hidden;
      overflow-y: hidden;
      background:
        linear-gradient(180deg, var(--uc-page-bg) 0%, color-mix(in srgb, var(--uc-page-bg) 97%, #000 3%) 100%);
    }
    /* ── Header ──────────────────────────────────────────────────── */
    header {
      margin: 0;
      padding: 0.35rem 0.6rem;
      height: auto;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      border-bottom: 1px solid var(--uc-page-border);
      background: var(--uc-page-surface-strong);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }
    header::before {
      display: none;
    }
    /* brand zone */
    .hdr-brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-shrink: 0;
    }
    .hdr-mark {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--uc-page-accent) 13%, var(--uc-page-panel));
      border: 1px solid color-mix(in srgb, var(--uc-page-accent) 26%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.52rem;
      font-weight: 900;
      letter-spacing: -0.07em;
      color: color-mix(in srgb, var(--uc-page-accent) 94%, #fff 6%);
      flex-shrink: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    .hdr-brand-name {
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--uc-page-text);
      line-height: 1;
    }
    .hdr-vsep {
      width: 1px;
      height: 14px;
      background: var(--uc-page-border);
      flex-shrink: 0;
      align-self: center;
    }
    .hdr-context {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    header h1 {
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 600;
      color: var(--uc-page-text);
      letter-spacing: 0.01em;
      margin: 0;
      line-height: 1.2;
      text-transform: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    header p {
      display: none;
    }
    /* nav */
    .header-links {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.14rem;
      flex-shrink: 0;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .header-links::-webkit-scrollbar { display: none; }
    header .editor-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 0 0.46rem;
      border-radius: 0;
      background: color-mix(in srgb, var(--uc-page-panel) 80%, transparent);
      color: var(--uc-page-muted);
      font-size: 0.58rem;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      border: 1px solid color-mix(in srgb, var(--uc-page-border) 80%, transparent);
      cursor: pointer;
      font-family: inherit;
      transition:
        background var(--uc-dur-fast) var(--uc-ease-standard),
        border-color var(--uc-dur-fast) var(--uc-ease-standard),
        color var(--uc-dur-fast) var(--uc-ease-standard),
        transform var(--uc-dur-fast) var(--uc-ease-out);
    }
    header .editor-link:hover {
      color: var(--uc-page-text);
      border-color: var(--uc-page-border);
      background: color-mix(in srgb, var(--uc-page-panel) 55%, transparent);
    }
    header .editor-link.active {
      color: var(--uc-page-accent);
      border-color: color-mix(in srgb, var(--uc-page-accent) 34%, transparent);
      background: var(--uc-page-accent-soft);
      box-shadow: inset 0 1px 0 color-mix(in srgb, var(--uc-page-accent) 16%, transparent);
    }
    header .editor-link--utility {
      background: transparent;
      color: color-mix(in srgb, var(--uc-page-muted) 68%, transparent);
    }
    /* separator before utility links */
    .hdr-nav-sep {
      display: block;
      width: 1px;
      height: 14px;
      background: var(--uc-page-border);
      flex-shrink: 0;
      align-self: center;
      margin: 0 0.22rem;
    }
    /* ── Palette button (header) ─────────────────────────────── */
    .hdr-palette {
      flex: 1;
      max-width: none;
      align-self: stretch;
      position: relative;
      display: flex;
      align-items: stretch;
    }
    .hdr-palette-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.38rem;
      padding: 0 0.72rem;
      height: auto;
      border-radius: 0;
      border: none;
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      cursor: pointer;
      font: 700 0.67rem/1 inherit;
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      white-space: nowrap;
      transition: filter 120ms var(--uc-ease-standard), opacity 120ms;
    }
    .hdr-palette-btn:hover { filter: brightness(1.12); }
    .hdr-palette-btn__name {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hdr-palette-btn__arrow {
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid rgba(255, 255, 255, 0.7);
      flex-shrink: 0;
    }
    /* Popup panel */
    .hdr-palette-popup {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      right: auto;
      transform: translateX(-50%);
      z-index: 9999;
      min-width: 236px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 10px;
      background: var(--uc-page-surface-strong);
      border: 1px solid var(--uc-page-border);
      border-radius: 10px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.4);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
    }
    .hdr-palette-popup.is-open { display: block; }
    .hdr-pop-mode-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .hdr-pop-mode {
      border: 1px solid var(--uc-page-border);
      background: transparent;
      color: var(--uc-page-muted);
      border-radius: 6px;
      padding: 3px 10px;
      font: 700 0.67rem/1.4 inherit;
      cursor: pointer;
      transition:
        border-color 100ms var(--uc-ease-standard),
        background 100ms var(--uc-ease-standard),
        color 100ms var(--uc-ease-standard);
    }
    .hdr-pop-mode:hover {
      border-color: var(--uc-page-accent);
      background: var(--uc-page-accent-soft);
      color: var(--uc-page-text);
    }
    .hdr-pop-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }
    .hdr-pop-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 5px;
      border: 2px solid transparent;
      cursor: pointer;
      transition:
        border-color 100ms var(--uc-ease-standard),
        transform 100ms var(--uc-ease-out);
    }
    .hdr-pop-swatch:hover { transform: scale(1.1); }
    .hdr-pop-swatch.active {
      border-color: var(--uc-page-accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--uc-page-accent) 50%, transparent);
    }
    .hdr-nav-sep {
      display: block;
      width: 1px;
      height: 14px;
      background: var(--uc-page-border);
      flex-shrink: 0;
      align-self: center;
      margin: 0 0.22rem;
    }
    .tabs { display: none; }
    .tab { display: none; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
      gap: 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }
    body.mission-mode header {
      height: auto;
      padding: 0.3rem 0.5rem;
      gap: 0.45rem;
    }
    body.mission-mode footer {
      display: none;
    }
    /* ── Mission-mode full-height flex chain ────────────────── */
    body.mission-mode {
      display: flex;
      flex-direction: column;
    }
    body.mission-mode main {
      flex: 1 1 0%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body.mission-mode .grid {
      flex: 1 1 0%;
      min-height: 0;
      height: auto;
      max-width: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body.mission-mode .grid.grid--mission {
      display: flex;
      flex-direction: column;
    }
    body.mission-mode > header {
      position: relative;
      z-index: 10000;
      flex: 0 0 auto;
      isolation: isolate;
    }
    body.mission-mode > header [role="listbox"],
    body.mission-mode > header [role="menu"],
    body.mission-mode > header .theme-popover,
    body.mission-mode > header .palette-popover {
      z-index: 10001 !important;
    }
    .card {
      background: var(--uc-page-panel);
      border-radius: var(--uc-page-radius);
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--uc-page-border);
      box-shadow: var(--uc-page-shadow-soft);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: color-mix(in srgb, var(--uc-page-accent) 34%, var(--uc-page-border));
      box-shadow: var(--uc-page-shadow);
      transform: translateY(-1px);
    }
    .card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--uc-page-text);
    }
    .chart-box {
      width: 100%;
      height: 380px;
      background: color-mix(in srgb, var(--uc-page-bg) 82%, #000000 18%);
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
      position: relative;
      border: 1px solid color-mix(in srgb, var(--uc-page-border) 86%, transparent);
    }
    .sdk-shell {
      max-width: 1760px;
      margin: 0 auto;
      padding: 0.9rem 1.35rem 2rem;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 0.9rem;
      align-items: start;
    }
    .sdk-sidebar,
    .sdk-panel {
      background: rgba(9, 17, 31, 0.8);
      border: 1px solid rgba(71, 85, 105, 0.5);
      border-radius: 12px;
      box-shadow: 0 14px 28px rgba(2, 8, 23, 0.16);
      transition:
        border-color var(--uc-dur-mid) var(--uc-ease-standard),
        box-shadow var(--uc-dur-mid) var(--uc-ease-standard),
        background var(--uc-dur-mid) var(--uc-ease-standard),
        transform var(--uc-dur-mid) var(--uc-ease-standard);
    }
    .sdk-sidebar {
      position: sticky;
      top: 44px;
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sdk-sidebar-head {
      padding: 0.88rem 0.95rem 0.4rem;
    }
    .sdk-kicker {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #7dd3fc;
      font-weight: 800;
      margin-bottom: 0.3rem;
    }
    .sdk-sidebar-head h2,
    .sdk-main-head h2 {
      font-size: 1.2rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: #f8fafc;
      margin-bottom: 0.34rem;
    }
    .sdk-sidebar-head p,
    .sdk-main-head p {
      color: #8ba0b8;
      font-size: 0.76rem;
      line-height: 1.45;
    }
    .sdk-search-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.42rem;
      padding: 0.55rem 1rem 0.55rem;
    }
    .sdk-search-wrap span {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }
    .sdk-search {
      width: 100%;
      padding: 0.72rem 0.84rem;
      border-radius: 10px;
      border: 1px solid rgba(71, 85, 105, 0.62);
      background: rgba(7, 13, 24, 0.86);
      color: #e2e8f0;
      font: inherit;
      transition:
        border-color var(--uc-dur-fast) var(--uc-ease-standard),
        background var(--uc-dur-fast) var(--uc-ease-standard),
        box-shadow var(--uc-dur-fast) var(--uc-ease-standard);
    }
    .sdk-search:focus,
    .sdk-editor:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.8);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
    }
    .sdk-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem 0.65rem;
      padding: 0 1rem 0.3rem;
    }
    .sdk-filter {
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      color: #7f8ea3;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition:
        color var(--uc-dur-fast) var(--uc-ease-standard),
        opacity var(--uc-dur-fast) var(--uc-ease-standard),
        text-decoration-color var(--uc-dur-fast) var(--uc-ease-standard);
    }
    .sdk-filter:hover,
    .sdk-filter.active,
    .sdk-nav-item:hover,
    .sdk-nav-item.active {
      color: #eef2ff;
    }
    .sdk-filter.active {
      color: #eef2ff;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 0.32rem;
      text-decoration-color: rgba(129, 140, 248, 0.9);
    }
    .sdk-action {
      padding: 0.46rem 0.68rem;
      border-radius: 9px;
      border: 1px solid rgba(71, 85, 105, 0.65);
      background: rgba(12, 20, 35, 0.72);
      color: #cdd9e8;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 680;
      cursor: pointer;
      transition:
        border-color var(--uc-dur-fast) var(--uc-ease-standard),
        background var(--uc-dur-fast) var(--uc-ease-standard),
        color var(--uc-dur-fast) var(--uc-ease-standard),
        transform var(--uc-dur-fast) var(--uc-ease-out),
        box-shadow var(--uc-dur-fast) var(--uc-ease-standard);
    }
    .sdk-tab {
      padding: 0.46rem 0.68rem;
      border-radius: 9px;
      border: 1px solid rgba(71, 85, 105, 0.65);
      background: rgba(12, 20, 35, 0.72);
      color: #cdd9e8;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 680;
      cursor: pointer;
      transition:
        border-color var(--uc-dur-fast) var(--uc-ease-standard),
        background var(--uc-dur-fast) var(--uc-ease-standard),
        color var(--uc-dur-fast) var(--uc-ease-standard),
        transform var(--uc-dur-fast) var(--uc-ease-out),
        box-shadow var(--uc-dur-fast) var(--uc-ease-standard);
    }
    .sdk-action:hover,
    .sdk-tab:hover,
    .sdk-tab.active {
      border-color: rgba(56, 189, 248, 0.55);
      background: rgba(56, 189, 248, 0.12);
      color: #f0f7ff;
      box-shadow: 0 8px 16px rgba(2, 8, 23, 0.18);
    }
    .sdk-action:active,
    .sdk-tab:active { transform: translateY(1px) scale(0.99); }
    .sdk-action:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }
    .sdk-nav {
      flex: 1;
      min-height: 0;
      padding: 0.7rem 0.45rem 0.7rem 0.9rem;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .sdk-nav-group {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .sdk-nav-group-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      padding-right: 0.35rem;
    }
    .sdk-nav-group-head span,
    .sdk-nav-group-head em {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      font-weight: 800;
      font-style: normal;
    }
    .sdk-nav-item {
      width: calc(100% - 0.35rem);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 0.34rem;
      padding: 0.66rem 0.72rem;
      border-radius: 10px;
      border: 1px solid rgba(71, 85, 105, 0.45);
      background: rgba(10, 17, 30, 0.62);
      color: #e2e8f0;
      font: inherit;
      cursor: pointer;
      transition:
        transform var(--uc-dur-mid) var(--uc-ease-standard),
        background var(--uc-dur-mid) var(--uc-ease-standard),
        border-color var(--uc-dur-mid) var(--uc-ease-standard),
        box-shadow var(--uc-dur-mid) var(--uc-ease-standard);
    }
    .sdk-nav-item:hover,
    .sdk-nav-item.active {
      transform: translateX(2px);
      border-color: rgba(56, 189, 248, 0.55);
      background: rgba(12, 24, 42, 0.82);
      box-shadow: 0 10px 18px rgba(2, 8, 23, 0.18);
    }
    .sdk-nav-item-top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .sdk-nav-item-title {
      color: #f8fafc;
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.35;
    }
    .sdk-nav-item-meta {
      color: #94a3b8;
      font-size: 0.73rem;
    }
    .sdk-main {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      min-width: 0;
    }
    .sdk-main-head,
    .sdk-panel-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .sdk-main-head h2 {
      font-size: 1.48rem;
      line-height: 1.02;
      margin-bottom: 0.25rem;
    }
    .sdk-main-head p {
      color: #8da0ba;
      font-size: 0.78rem;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      letter-spacing: -0.01em;
    }
    .sdk-panel-head-side {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 0.75rem;
      align-items: center;
      justify-content: flex-end;
    }
    .sdk-panel-actions,
    .sdk-tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .sdk-panel {
      padding: 0.78rem 0.84rem;
