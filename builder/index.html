<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RiskLab - Builder</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>R</text></svg>" />
  <style>
    :root {
      --bg: #06101d;
      --bg-elev: #0c1a2e;
      --bg-panel: #101f34;
      --bg-input: #0a1628;
      --text: #e6edf8;
      --text-muted: #9bb0c7;
      --border: #29415d;
      --border-strong: #3b5f86;
      --accent: #5ca6ff;
      --danger: #f87171;
      --ok: #34d399;
      --shadow: 0 16px 34px rgba(3, 8, 17, 0.28);
      --radius: 12px;
      --mono: "Cascadia Code", "Fira Code", Consolas, Menlo, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Inter", "Segoe UI", sans-serif;
      background:
        radial-gradient(110% 90% at 10% -20%, rgba(71, 140, 214, 0.22), transparent 44%),
        radial-gradient(100% 90% at 100% 0%, rgba(49, 92, 163, 0.18), transparent 36%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body.light-mode {
      --bg: #edf2f8;
      --bg-elev: #f7fafd;
      --bg-panel: #ffffff;
      --bg-input: #f8fbff;
      --text: #0f2034;
      --text-muted: #4e647d;
      --border: #ccdae9;
      --border-strong: #aac4e0;
      --accent: #1d70d6;
      --danger: #b42323;
      --ok: #0e8d57;
      --shadow: 0 14px 28px rgba(14, 33, 53, 0.1);
      background:
        radial-gradient(120% 90% at 10% -20%, rgba(86, 143, 207, 0.15), transparent 42%),
        radial-gradient(100% 90% at 100% -10%, rgba(73, 121, 184, 0.12), transparent 38%),
        var(--bg);
    }

    .builder-header {
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg-elev) 88%, transparent);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1rem 0 1.2rem;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
    }

    .brand h1 {
      font-size: 1.03rem;
      line-height: 1;
      letter-spacing: -0.02em;
      font-weight: 720;
    }

    .brand p {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .link-btn,
    .action-btn,
    .field,
    .toggle input + span {
      font: inherit;
    }

    .link-btn,
    .action-btn {
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      border-radius: 9px;
      padding: 0.4rem 0.65rem;
      font-size: 0.76rem;
      font-weight: 620;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }

    .link-btn:hover,
    .action-btn:hover {
      border-color: var(--border-strong);
      background: color-mix(in srgb, var(--bg-panel) 82%, var(--accent) 18%);
    }

    .link-btn:active,
    .action-btn:active {
      transform: translateY(1px);
    }

    .builder-shell {
      height: calc(100vh - 60px);
      display: grid;
      grid-template-columns: minmax(270px, 320px) minmax(0, 1fr) minmax(360px, 450px);
      gap: 0.7rem;
      padding: 0.7rem;
    }

    .panel {
      min-width: 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg-panel) 92%, transparent);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-head {
      padding: 0.8rem 0.9rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .panel-head h2 {
      font-size: 0.9rem;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 760;
      color: var(--text);
    }

    .panel-head small {
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 560;
    }

    .controls-body {
      padding: 0.9rem;
      overflow-y: auto;
      display: grid;
      gap: 0.75rem;
      align-content: start;
    }

    .field-row {
      display: grid;
      gap: 0.35rem;
    }

    .field-row label,
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .field,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--bg-input);
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.2;
      padding: 0.5rem 0.6rem;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .field:focus,
    .textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 26%, transparent);
    }

    .tooltip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      padding: 0.65rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: color-mix(in srgb, var(--bg-elev) 76%, transparent);
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      min-height: 32px;
    }

    .toggle span {
      font-size: 0.76rem;
      color: var(--text);
      font-weight: 540;
    }

    .toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .subfield {
      display: grid;
      gap: 0.28rem;
    }

    .subfield label {
      font-size: 0.66rem;
      color: var(--text-muted);
      font-weight: 620;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding-top: 0.55rem;
    }

    .status-text {
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    .status-text.error {
      color: var(--danger);
      font-weight: 620;
    }

    .status-text.ok {
      color: var(--ok);
      font-weight: 620;
    }

    .preview-body {
      flex: 1;
      padding: 0.85rem;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .chart-wrap {
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background:
        radial-gradient(120% 90% at 15% 0%, rgba(92, 166, 255, 0.14), transparent 42%),
        var(--bg-elev);
      overflow: hidden;
    }

    #chart-container {
      width: 100%;
      height: 100%;
      min-height: 360px;
    }

    .json-body {
      flex: 1;
      min-height: 0;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .textarea {
      flex: 1;
      min-height: 0;
      resize: none;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.56;
      white-space: pre;
      overflow: auto;
    }

    .json-meta {
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .json-meta strong {
      font-weight: 660;
      color: var(--text);
    }

    @media (max-width: 1400px) {
      .builder-shell {
        grid-template-columns: minmax(250px, 300px) minmax(0, 1fr) minmax(320px, 380px);
      }
    }

    @media (max-width: 1140px) {
      body {
        overflow: auto;
      }

      .builder-shell {
        height: auto;
        min-height: calc(100vh - 60px);
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 280px;
      }

      #chart-container {
        min-height: 440px;
      }
    }
  </style>
  <script type="module" crossorigin src="../assets/builder-kyo4FGGc.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/index-CRbE5iiy.js">
</head>
<body>
  <header class="builder-header">
    <div class="brand">
      <h1>Builder</h1>
      <p>Live config controls, live render, live JSON.</p>
    </div>
    <div class="header-actions">
      <a class="link-btn" href="../">Charts</a>
      <a class="link-btn" href="../wiki/">Wiki</a>
      <button class="action-btn" id="copy-link-btn" type="button">Copy Link</button>
      <button class="action-btn" id="export-png-btn" type="button">Export PNG</button>
      <button class="action-btn" id="export-svg-btn" type="button">Export SVG</button>
      <button class="action-btn" id="export-json-btn" type="button">Export JSON</button>
    </div>
  </header>

  <main class="builder-shell">
    <section class="panel">
      <div class="panel-head">
        <h2>Chart Config</h2>
      </div>
      <div class="controls-body">
        <div class="field-row">
          <label for="preset-select">Preset</label>
          <select id="preset-select" class="field"></select>
        </div>

        <div class="field-row">
          <label for="palette-select">Theme Palette</label>
          <select id="palette-select" class="field"></select>
        </div>

        <div class="field-row">
          <label for="mode-select">Mode</label>
          <select id="mode-select" class="field">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>

        <div class="section-title">Tooltips and Mouseover</div>
        <div class="tooltip-grid">
          <label class="toggle">
            <span>Tooltip enabled</span>
            <input id="tooltip-enabled" type="checkbox" />
          </label>
          <label class="toggle">
            <span>Shared tooltip</span>
            <input id="tooltip-shared" type="checkbox" />
          </label>
          <label class="toggle">
            <span>Crosshair enabled</span>
            <input id="tooltip-crosshair" type="checkbox" />
          </label>
          <label class="toggle">
            <span>Pinnable on click</span>
            <input id="tooltip-pinnable" type="checkbox" />
          </label>

          <div class="subfield">
            <label for="tooltip-trigger">Trigger</label>
            <select id="tooltip-trigger" class="field">
              <option value="hover">Hover</option>
              <option value="click">Click</option>
              <option value="both">Both</option>
            </select>
          </div>

          <div class="subfield">
            <label for="crosshair-axis">Crosshair axis</label>
            <select id="crosshair-axis" class="field">
              <option value="both">Both</option>
              <option value="x">X only</option>
              <option value="y">Y only</option>
            </select>
          </div>

          <div class="subfield">
            <label for="tooltip-sort">Sort items</label>
            <select id="tooltip-sort" class="field">
              <option value="none">None</option>
              <option value="ascending">Ascending</option>
              <option value="descending">Descending</option>
            </select>
          </div>
        </div>

        <div class="status-line">
          <span id="status-text" class="status-text">Ready</span>
          <span id="render-time" class="status-text">-</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Chart Rendering</h2>
        <small id="render-summary">Live preview</small>
      </div>
      <div class="preview-body">
        <div class="chart-wrap">
          <div id="chart-container"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Chart JSON</h2>
        <small id="json-state">Live</small>
      </div>
      <div class="json-body">
        <div class="json-meta">
          <span><strong>Source</strong> updates render on each valid edit.</span>
          <span id="json-size">0 bytes</span>
        </div>
        <textarea
          id="json-editor"
          class="textarea"
          spellcheck="false"
          aria-label="Chart JSON editor"
        ></textarea>
      </div>
    </section>
  </main>

</body>
</html>
